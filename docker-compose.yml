version: '3.8'

services:
  app:
    build: .
    container_name: fuvex_manager_prod
    ports:
      - "3001:3001"
    env_file:
      - apps/backend/.env
    volumes:
      - ./apps/backend/prisma/dev.db:/app/apps/backend/prisma/dev.db
      - ./storage:/app/storage
      - ./backups:/app/backups
    restart: always

  # Servicio opcional de Backup automático (se puede activar con un cron externo)
  # O simplemente correrlo manualmente
